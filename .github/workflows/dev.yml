name: Dev Pipeline

on:
  push:
    branches:
      - dev

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Preuzimanje koda (Checkout)
        uses: actions/checkout@v4

      - name: Podesavanje Node.js okruzenja
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Instalacija zavisnosti i pokretanje testova
        run: |
          npm ci
          npm test

      - name: Povezivanje sa Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Provera Docker Build-a (Bez push-a na DockerHub)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/multi-stage-build-cicd:dev-${{ github.sha }}
